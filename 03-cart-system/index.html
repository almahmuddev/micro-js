<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart System — JS Build</title>

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap"
    rel="stylesheet" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="./style/cart.css" />

</head>

<body>

  <div class="layout">
    <!-- Products -->
    <div>
      <h2>Shop</h2>
      <div class="products-grid" id="products-grid"></div>
    </div>

    <!-- Cart -->
    <div class="cart-panel">
      <h2>
        Cart
        <span class="cart-count-badge" id="cart-badge">0</span>
      </h2>
      <p class="cart-empty" id="cart-empty">Your cart is empty.</p>
      <ul class="cart-items" id="cart-items"></ul>
      <div class="cart-summary" id="cart-summary">
        <div class="summary-row"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
        <div class="summary-row"><span>Shipping</span><span id="shipping">$0.00</span></div>
        <div class="summary-total"><span>Total</span><span id="total">$0.00</span></div>
        <button class="checkout-btn" id="checkout-btn">Checkout</button>
      </div>
    </div>
  </div>

  <!-- Custom JS -->
   <script src="./js/cart.js"></script>
   <script src="./js/data.js"></script>
</body>

</html>
