<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Flow Timer</title>
    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: system-ui;
            display: grid;
            place-items: center;
            height: 100vh;
            margin: 0;
        }

        .timer-card {
            background: #1e293b;
            padding: 2rem;
            border-radius: 16px;
            width: 320px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        input {
            width: 80%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            margin-bottom: 1rem;
            outline: none;
        }

        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #7dd3fc;
        }

        .time-display {
            font-size: 4rem;
            font-weight: 800;
            margin: 1rem 0;
            font-variant-numeric: tabular-nums;
        }

        .done {
            border: 2px solid #22c55e;
        }

        #timer-ui {
            display: none;
        }

        #reset-btn {
            background-color: #ef4444;
            color: white;
        }
    </style>
</head>

<body>

    <div class="timer-card" id="card">
        <div id="setup-ui">
            <input type="text" id="task-input" placeholder="What are you focusing on?">
            <button onclick="startTimer()">Start 1 Min Focus</button>
        </div>
        <div id="timer-ui">
            <small id="task-name-display"></small>
            <div class="time-display" id="countdown">01:00</div>
            <button onclick="resetTimer()" id="reset-btn">Reset</button>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const countdownEl = document.getElementById('countdown');
        const taskNameEl = document.getElementById('task-name-display');
        const setupUI = document.getElementById('setup-ui');
        const timerUI = document.getElementById('timer-ui');

        let timerInterval;

        // Check if a timer was already running before we refreshed
        window.onload = () => {
            const savedEndTime = localStorage.getItem('endTime');
            if (savedEndTime) {
                resumeTimer(parseInt(savedEndTime));
            }
        };

        function startTimer() {
            const task = document.getElementById('task-input').value || "Deep Work";
            const duration = 60 * 1000; // 1 minute in milliseconds
            const endTime = Date.now() + duration;

            localStorage.setItem('endTime', endTime);
            localStorage.setItem('taskName', task);

            resumeTimer(endTime);
        }

        function resumeTimer(endTime) {
            setupUI.style.display = 'none';
            timerUI.style.display = 'block';
            taskNameEl.innerText = localStorage.getItem('taskName');

            timerInterval = setInterval(() => {
                const now = Date.now();
                const distance = endTime - now;

                if (distance <= 0) {
                    clearInterval(timerInterval);
                    countdownEl.innerText = "00:00";
                    card.classList.add('done');
                    return;
                }

                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                countdownEl.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timerInterval);
            localStorage.clear();
            location.reload(); // Hard reset
        }
    </script>
</body>

</html>
