<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toast System — JS Build</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --surface: #fff;
      --border: #e8e5df;
      --text: #1a1a18;
      --muted: #888880;
      --radius: 10px;

      --success-bg: #f0faf3;
      --success-border: #b8e8c4;
      --success-text: #1a6632;
      --success-icon: #25a244;

      --error-bg: #fff4f4;
      --error-border: #f5c0c0;
      --error-text: #7a1a1a;
      --error-icon: #e03030;

      --warning-bg: #fffbf0;
      --warning-border: #f0dfa0;
      --warning-text: #7a5a00;
      --warning-icon: #d4a017;

      --info-bg: #f3f7ff;
      --info-border: #bdd0f5;
      --info-text: #1a3a7a;
      --info-icon: #2b6be6;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .demo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 520px;
    }

    .demo-card h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
      letter-spacing: -0.01em;
    }

    .demo-card p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    .btn {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 0.65rem 1rem;
      border-radius: var(--radius);
      cursor: pointer;
      border: 1px solid;
      transition: opacity 0.15s, transform 0.15s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn:active { transform: scale(0.98); opacity: 0.85; }

    .btn-success { background: var(--success-bg); border-color: var(--success-border); color: var(--success-text); }
    .btn-error   { background: var(--error-bg);   border-color: var(--error-border);   color: var(--error-text); }
    .btn-warning { background: var(--warning-bg); border-color: var(--warning-border); color: var(--warning-text); }
    .btn-info    { background: var(--info-bg);    border-color: var(--info-border);    color: var(--info-text); }

    .btn-clear-all {
      width: 100%;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      padding: 0.55rem;
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-clear-all:hover { border-color: #ccc; color: var(--text); }

    .queue-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 1.2rem;
    }

    #queue-display {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.4rem;
      min-height: 1rem;
      transition: color 0.2s;
    }

    /* ─── Toast Container ─── */
    #toast-container {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      z-index: 9999;
      width: 340px;
      pointer-events: none;
    }

    .toast {
      pointer-events: all;
      border: 1px solid;
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      font-size: 0.85rem;
      line-height: 1.45;
      position: relative;
      overflow: hidden;
      animation: slideIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .toast.removing {
      animation: slideOut 0.22s ease forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(110%); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes slideOut {
      from { opacity: 1; transform: translateX(0); max-height: 100px; }
      to   { opacity: 0; transform: translateX(110%); max-height: 0; padding: 0; margin: 0; }
    }

    .toast-success { background: var(--success-bg); border-color: var(--success-border); color: var(--success-text); }
    .toast-error   { background: var(--error-bg);   border-color: var(--error-border);   color: var(--error-text); }
    .toast-warning { background: var(--warning-bg); border-color: var(--warning-border); color: var(--warning-text); }
    .toast-info    { background: var(--info-bg);    border-color: var(--info-border);    color: var(--info-text); }

    .toast-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .toast-body { flex: 1; }
    .toast-title { font-weight: 500; margin-bottom: 2px; }
    .toast-msg   { font-size: 0.8rem; opacity: 0.8; }

    .toast-close {
      background: none;
      border: none;
      cursor: pointer;
      color: inherit;
      opacity: 0.5;
      font-size: 1rem;
      line-height: 1;
      padding: 0;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .toast-close:hover { opacity: 1; }

    .toast-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: currentColor;
      opacity: 0.25;
      animation: progress linear forwards;
    }

    @keyframes progress {
      from { width: 100%; }
      to   { width: 0%; }
    }
  </style>
</head>
<body>

<div class="demo-card">
  <h1>toast.notify()</h1>
  <p>A queued notification system — auto-dismiss, manual close, max stack of 5. Try spamming them.</p>

  <div class="btn-grid">
    <button class="btn btn-success" onclick="toast.success('Changes saved', 'Your draft has been saved successfully.')">✓ Success</button>
    <button class="btn btn-error"   onclick="toast.error('Upload failed', 'File exceeds the 10MB size limit.')">✕ Error</button>
    <button class="btn btn-warning" onclick="toast.warning('Storage almost full', 'You\'ve used 92% of your quota.')">⚠ Warning</button>
    <button class="btn btn-info"    onclick="toast.info('New version available', 'Refresh to load the latest update.')">ℹ Info</button>
  </div>

  <button class="btn-clear-all" onclick="toast.clearAll()">clear all toasts</button>

  <p class="queue-label">active toasts</p>
  <div id="queue-display">—</div>
</div>

<div id="toast-container"></div>

<script>
  const toast = (() => {
    const DURATION = 4000;
    const MAX = 5;
    const container = document.getElementById('toast-container');
    const queueDisplay = document.getElementById('queue-display');

    // track active toasts in a simple array
    let active = [];

    function updateQueueDisplay() {
      queueDisplay.textContent = active.length === 0
        ? '—'
        : active.map(t => `[${t.type}]`).join('  ');
    }

    function remove(id) {
      const el = document.getElementById(id);
      if (!el) return;

      el.classList.add('removing');

      // wait for the CSS animation to finish before removing from DOM
      el.addEventListener('animationend', () => {
        el.remove();
        active = active.filter(t => t.id !== id);
        updateQueueDisplay();
      }, { once: true });
    }

    function notify(type, title, message) {
      // if already at max, remove the oldest one first
      if (active.length >= MAX) {
        remove(active[0].id);
      }

      const id = `toast-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;
      const icons = {
        success: `<svg class="toast-icon" viewBox="0 0 16 16" fill="none" stroke="var(--success-icon)" stroke-width="2"><circle cx="8" cy="8" r="7"/><path d="m5 8 2 2 4-4"/></svg>`,
        error:   `<svg class="toast-icon" viewBox="0 0 16 16" fill="none" stroke="var(--error-icon)" stroke-width="2"><circle cx="8" cy="8" r="7"/><path d="m5 5 6 6M11 5l-6 6"/></svg>`,
        warning: `<svg class="toast-icon" viewBox="0 0 16 16" fill="none" stroke="var(--warning-icon)" stroke-width="2"><path d="M8 2 1.5 13.5h13L8 2Z"/><path d="M8 6v4M8 11.5v.5"/></svg>`,
        info:    `<svg class="toast-icon" viewBox="0 0 16 16" fill="none" stroke="var(--info-icon)" stroke-width="2"><circle cx="8" cy="8" r="7"/><path d="M8 7v5M8 5v.01"/></svg>`,
      };

      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.id = id;
      el.innerHTML = `
        ${icons[type]}
        <div class="toast-body">
          <div class="toast-title">${title}</div>
          <div class="toast-msg">${message}</div>
        </div>
        <button class="toast-close" onclick="toast._remove('${id}')" aria-label="Close">&times;</button>
        <div class="toast-progress" style="animation-duration: ${DURATION}ms;"></div>
      `;

      container.appendChild(el);
      active.push({ id, type });
      updateQueueDisplay();

      setTimeout(() => remove(id), DURATION);
    }

    return {
      success: (title, msg) => notify('success', title, msg),
      error:   (title, msg) => notify('error',   title, msg),
      warning: (title, msg) => notify('warning', title, msg),
      info:    (title, msg) => notify('info',    title, msg),
      clearAll: () => {
        [...active].forEach(t => remove(t.id));
      },
      _remove: remove,
    };
  })();
</script>
</body>
</html>
