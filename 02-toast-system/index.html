<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toast System — JS Build</title>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./toast.css">

</head>

<body>

  <div class="demo-card">
    <h1>toast.notify()</h1>
    <p>A queued notification system — auto-dismiss, manual close, max stack of 5. Try spamming them.</p>

    <div class="btn-grid">
      <button class="btn btn-success"
        onclick="toast.success('Changes saved', 'Your draft has been saved successfully.')">✓ Success</button>
      <button class="btn btn-error" onclick="toast.error('Upload failed', 'File exceeds the 10MB size limit.')">✕
        Error</button>
      <button class="btn btn-warning"
        onclick="toast.warning('Storage almost full', 'You\'ve used 92% of your quota.')">⚠ Warning</button>
      <button class="btn btn-info" onclick="toast.info('New version available', 'Refresh to load the latest update.')">ℹ
        Info</button>
    </div>

    <button class="btn-clear-all" onclick="toast.clearAll()">clear all toasts</button>

    <p class="queue-label">active toasts</p>
    <div id="queue-display">—</div>
  </div>

  <div id="toast-container"></div>

  <script>
    const toast = (() => {
      const stayTime = 4000;
      const maxAllowed = 5; 

      const box = document.getElementById('toast-container');
      const statusLabel = document.getElementById('queue-display');

      let visibleToasts = [];

      function refreshStatus() {
        statusLabel.textContent = visibleToasts.length === 0
          ? '—'
          : visibleToasts.map(t => `[${t.type}]`).join('  ');
      }

      function dismiss(toastId) {
        const target = document.getElementById(toastId);
        if (!target) return;

        target.classList.add('removing');

        target.addEventListener('animationend', () => {
          target.remove();
          visibleToasts = visibleToasts.filter(t => t.id !== toastId);
          refreshStatus();
        }, { once: true });
      }

      function spawn(type, title, text) {
        if (visibleToasts.length >= maxAllowed) {
          dismiss(visibleToasts[0].id);
        }

        const uniqueId = `msg-${Date.now()}-${Math.random().toString(16).slice(2, 6)}`;

        const svgIcons = {
          success: `<svg class="toast-icon" viewBox="0 0 16 16" fill="none" stroke="var(--success-icon)" stroke-width="2"><circle cx="8" cy="8" r="7"/><path d="m5 8 2 2 4-4"/></svg>`,
          error: `<svg class="toast-icon" viewBox="0 0 16 16" fill="none" stroke="var(--error-icon)" stroke-width="2"><circle cx="8" cy="8" r="7"/><path d="m5 5 6 6M11 5l-6 6"/></svg>`,
          warning: `<svg class="toast-icon" viewBox="0 0 16 16" fill="none" stroke="var(--warning-icon)" stroke-width="2"><path d="M8 2 1.5 13.5h13L8 2Z"/><path d="M8 6v4M8 11.5v.5"/></svg>`,
          info: `<svg class="toast-icon" viewBox="0 0 16 16" fill="none" stroke="var(--info-icon)" stroke-width="2"><circle cx="8" cy="8" r="7"/><path d="M8 7v5M8 5v.01"/></svg>`,
        };

        const toastElement = document.createElement('div');
        toastElement.className = `toast toast-${type}`;
        toastElement.id = uniqueId;

        toastElement.innerHTML = `
          ${svgIcons[type]}
          <div class="toast-body">
            <div class="toast-title">${title}</div>
            <div class="toast-msg">${text}</div>
          </div>
          <button class="toast-close" onclick="toast._kill('${uniqueId}')" aria-label="Close">&times;</button>
          <div class="toast-progress" style="animation-duration: ${stayTime}ms;"></div>
        `;

        box.appendChild(toastElement);
        visibleToasts.push({ id: uniqueId, type });
        refreshStatus();

        setTimeout(() => dismiss(uniqueId), stayTime);
      }

      return {
        success: (title, msg) => spawn('success', title, msg),
        error: (title, msg) => spawn('error', title, msg),
        warning: (title, msg) => spawn('warning', title, msg),
        info: (title, msg) => spawn('info', title, msg),
        clearAll: () => {
          [...visibleToasts].forEach(t => dismiss(t.id));
        },
        _kill: dismiss, 
      };
    })();
  </script>
</body>

</html>
