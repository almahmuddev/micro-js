

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Flow Timer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white flex items-center justify-center h-screen">

  <div id="card" class="w-80 bg-slate-800 p-6 rounded-2xl shadow-xl text-center">

    <!-- Setup -->
    <div id="setup-ui">
      <input id="task-input"
        class="w-full p-2 rounded bg-slate-900 border border-slate-700 mb-4 outline-none"
        placeholder="What are you focusing on?"
      />

      <button onclick="startTimer()"
        class="bg-sky-400 text-slate-900 font-bold px-4 py-2 rounded hover:bg-sky-300 transition">
        Start Focus
      </button>
    </div>

    <!-- Timer -->
    <div id="timer-ui" class="hidden">
      <small id="task-name-display" class="text-slate-400"></small>

      <div id="countdown" class="text-5xl font-bold my-4 tabular-nums">
        01:00
      </div>

      <div class="flex gap-2 justify-center">
        <button onclick="togglePause()"
          class="bg-yellow-400 text-black px-3 py-1 rounded">
          Pause
        </button>

        <button onclick="resetTimer()"
          class="bg-red-500 px-3 py-1 rounded">
          Reset
        </button>
      </div>
    </div>

  </div>

  <script src="./focus.js"></script>
</body>
</html>
